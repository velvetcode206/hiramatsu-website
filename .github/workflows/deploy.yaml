name: Deploy

on:
  push:
    branches: [develop, main]

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy app to cloudflare

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22] # Only one, so it doesn't run multiple times

    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Deploy to Cloudflare Pages        
        uses: cloudflare/wrangler-action@v3     
        id: cloudflare-deploy   
        with:          
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name="${{ github.event.repository.name }}" --branch="${{ github.ref_name }}"

      - name: Create GitHub deployment
        id: github-deploy
        uses: actions/github-script@v7
        with:
          script: |
            const env = "${{ github.ref_name == 'main' && 'production' || 'development' }}";

            const res = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: env,
              auto_merge: false,
              required_contexts: []
            });

            return res.data.id;

      - name: Set deployment status with URL
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.github-deploy.outputs.result }}
          URL: ${{ steps.cloudflare-deploy.outputs.deployment-url }}
        with:
          script: |
            const deploymentId = process.env.DEPLOYMENT_ID;
            const url = process.env.URL;

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(deploymentId),
              state: "success",
              environment_url: url,
              description: "Cloudflare Pages deployment"
            });
